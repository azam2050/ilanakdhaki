kind = "web"
previewPath = "/"
title = "لوحة التاجر — الإعلانات الذكية"
version = "1.0.0"
id = "artifacts/merchant-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19445

[services.development]
run = "pnpm --filter @workspace/merchant-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/merchant-dashboard", "run", "build" ]
publicDir = "artifacts/merchant-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19445"
BASE_PATH = "/"
